<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB MASTER | Gerenciamento CineCash</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-functions.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="login-container">
        <div class="login-box glass">
            <h2>HUB MASTER LOGIN</h2>
            <input type="email" id="login-email" placeholder="E-mail Admin">
            <div style="position:relative; width:100%;">
                <input type="password" id="login-pass" placeholder="Senha">
                <span id="toggle-password" style="position:absolute; right:15px; top:12px; cursor:pointer;">👁️</span>
            </div>
            <button id="btn-login">ACESSAR NÚCLEO</button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="hub-app" class="app-container" style="display:none;">
        <nav class="sidebar glass">
            <div class="logo">💠 HUB MASTER</div>
            <div class="nav-links">
                <button class="nav-item active" onclick="showPanel('dashboard')">📊 Dashboard</button>
                <button class="nav-item" onclick="showPanel('saques')">💸 Saques</button>
                <button class="nav-item" onclick="showPanel('usuarios')">👥 Usuários</button>
                <button class="nav-item" onclick="showPanel('seguranca')">🛡️ Segurança</button>
                <button class="nav-item" onclick="showPanel('terminal')">⌨️ Terminal IA</button>
            </div>
            <div class="user-pill glass">
                <span id="user-display-name">ADMIN</span>
                <button onclick="logout()">Sair</button>
            </div>
        </nav>

        <main class="content">
            <header class="top-bar">
                <h1 id="current-panel-name">DASHBOARD</h1>
                <div class="global-stats">
                    <div class="mini-stat">Users: <span id="stat-users">0</span></div>
                    <div class="mini-stat">Saldo: <span id="stat-balance">R$ 0,00</span></div>
                </div>
            </header>

            <!-- PAINEL: DASHBOARD -->
            <div id="panel-dashboard" class="panel-view active">
                <div id="projects-container" class="projects-grid">
                    <!-- Cards de Apps injetados pelo app.js -->
                </div>
            </div>

            <!-- PAINEL: SAQUES -->
            <div id="panel-saques" class="panel-view">
                <div class="premium-glass panel-card">
                    <div class="card-header">
                        <h3>Pedidos Pendentes</h3>
                        <span id="total-pendente-display">R$ 0,00</span>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Usuário</th>
                                <th>Chave PIX</th>
                                <th>Valor</th>
                                <th>Atividade</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="withdrawals-table-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- PAINEL: TERMINAL IA -->
            <div id="panel-terminal" class="panel-view">
                <div class="terminal-container premium-glass">
                    <div class="terminal-header">CYBERCORE IA - INTERFACE NEURAL</div>
                    <div id="terminal-body" class="terminal-content">
                        <div class="agent-box">
                            <label>Nexus (Geral)</label>
                            <div id="agent-nexus-body" class="agent-log"></div>
                        </div>
                        <div class="agent-box">
                            <label>Sentinel (Segurança)</label>
                            <div id="agent-sentinel-body" class="agent-log"></div>
                        </div>
                        <div class="agent-box">
                            <label>Auditor (Financeiro)</label>
                            <div id="agent-auditor-body" class="agent-log"></div>
                        </div>
                    </div>
                    <div class="terminal-input-area">
                        <input type="text" id="terminal-input" placeholder="Digite um comando para a CyberCore IA...">
                    </div>
                </div>
            </div>

            <!-- PAINEL: SEGURANÇA -->
            <div id="panel-seguranca" class="panel-view">
                <div class="premium-glass panel-card">
                    <h3>Logs de Atividades Suspeitas</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>UID</th>
                                <th>Evento</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="security-logs-table-body"></tbody>
                    </table>
                    <button onclick="simulateFraud()" style="margin-top:20px;">Simular Detecção</button>
                </div>
            </div>

            <!-- PAINEL: USUÁRIOS -->
            <div id="panel-usuarios" class="panel-view">
                <div class="premium-glass panel-card">
                    <h3>Base de Usuários</h3>
                    <input type="text" placeholder="Filtrar por Email ou UID..." oninput="renderUsersTable(this.value)" style="margin-bottom:15px; width:100%; padding:10px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); color:white;">
                    <table>
                        <thead>
                            <tr>
                                <th>UID</th>
                                <th>Email</th>
                                <th>Saldo</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>
    <script src="app.js"></script>
</body>
</html>
